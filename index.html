<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كوتشينج أكاديمي | مكتبتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-item { transition: all 0.3s; }
        .active-nav { color: #4f46e5; font-bold; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [page, setPage] = useState('home');

            // --- هنا تضع بياناتك بسهولة من الهاتف ---
            const books = [
                { id: 1, title: "دليل المذاكرة الذكية", type: "PDF", link: "#", color: "bg-blue-500" },
                { id: 2, title: "ملخص علم نفس العمل", type: "تفاعلي", link: "#", color: "bg-purple-500" }
            ];

            const articles = [
                { id: 1, title: "كيف تنظم وقتك في رمضان؟", date: "2026-03-10" },
                { id: 2, title: "سيكولوجية التركيز العميق", date: "2026-04-05" }
            ];
            // ---------------------------------------

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="p-6 bg-white border-b border-gray-100 sticky top-0 z-10">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-bold text-indigo-600">كوتشينج أكاديمي</h1>
                            <div className="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 font-bold">K</div>
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-grow p-5 mb-20">
                        {page === 'home' && (
                            <div className="animate-fadeIn">
                                <div className="bg-gradient-to-br from-indigo-600 to-purple-700 p-6 rounded-3xl text-white mb-8 shadow-xl shadow-indigo-100">
                                    <h2 className="text-2xl font-bold mb-2">أهلاً بك في مساحتك</h2>
                                    <p className="text-indigo-100 text-sm">استكشف المصادر التي أعددتها لك بعناية لتطوير مهاراتك.</p>
                                </div>
                                <h3 className="font-bold text-lg mb-4">روابط سريعة</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setPage('library')} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                                        <div className="text-2xl mb-1">📚</div>
                                        <div className="text-sm font-bold">المكتبة</div>
                                    </button>
                                    <button onClick={() => setPage('articles')} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                                        <div className="text-2xl mb-1">📝</div>
                                        <div className="text-sm font-bold">المقالات</div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {page === 'library' && (
                            <div className="animate-fadeIn">
                                <h2 className="text-2xl font-bold mb-6 flex items-center gap-2">
                                    <span onClick={() => setPage('home')} className="text-gray-400 text-sm">الرئيسية /</span> المكتبة
                                </h2>
                                <div className="space-y-4">
                                    {books.map(book => (
                                        <div key={book.id} className="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-100 shadow-sm">
                                            <div className="flex items-center gap-4">
                                                <div className={`${book.color} w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-xs`}>{book.type}</div>
                                                <div className="font-bold text-sm">{book.title}</div>
                                            </div>
                                            <a href={book.link} className="text-indigo-600 font-bold text-sm bg-indigo-50 px-4 py-2 rounded-lg">فتح</a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {page === 'articles' && (
                            <div className="animate-fadeIn">
                                <h2 className="text-2xl font-bold mb-6">المقالات الأخيرة</h2>
                                {articles.map(art => (
                                    <div key={art.id} className="bg-white p-5 rounded-2xl mb-4 border border-gray-100 shadow-sm">
                                        <h3 className="font-bold mb-1">{art.title}</h3>
                                        <div className="text-xs text-gray-400 mb-4">{art.date}</div>
                                        <button className="text-indigo-600 text-sm font-bold">اقرأ المقال بالكامل ←</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-8 py-4">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <button onClick={() => setPage('home')} className={`nav-item flex flex-col items-center ${page === 'home' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                <span className="text-[10px] font-bold mt-1">الرئيسية</span>
                            </button>
                            <button onClick={() => setPage('library')} className={`nav-item flex flex-col items-center ${page === 'library' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                <span className="text-[10px] font-bold mt-1">المكتبة</span>
                            </button>
                            <button onClick={() => setPage('articles')} className={`nav-item flex flex-col items-center ${page === 'articles' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                <span className="text-[10px] font-bold mt-1">المقالات</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
