<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body>

        const { useState } = React;

        function App() {
            return (
                <div className="min-h-screen bg-gray-50 text-right">

                    {/* باقي الكود هنا... */}
