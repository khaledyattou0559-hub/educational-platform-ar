<!DOCTYPE html>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #fdfcfb; margin: 0; }
        .hero-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .floating-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 30px; }
        .action-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
        .profile-img-container { position: relative; width: 150px; height: 150px; margin: 0 auto; }
        .profile-img-container::after { content: ''; position: absolute; inset: -4px; border: 3px solid rgba(255, 255, 255, 0.5); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.4; } 100% { transform: scale(1); opacity: 0.8; } }
        .channel-logo { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; }
    </style>
</head>

            <div class="space-y-4">

                    🚀 دخول القناة الرسمية

                <a href="https://t.me/+QteHo_d7AvU1MWU8" class="action-btn block w-full bg-white text-indigo-600 border-2 border-indigo-600 py-4 rounded-2xl font-bold text-center no-underline hover:bg-indigo-50">

    </main>

</body>
</html>
