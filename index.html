<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كوتشينج أكاديمي | المنصة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Tajawal', sans-serif; } .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; } </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activePage, setActivePage] = useState('home');

            return (
                <div className="pb-20">
                    {/* Header */}
                    <nav className="bg-white shadow-sm sticky top-0 z-50 px-4 py-3">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <span className="text-xl font-bold text-indigo-600">كوتشينج أكاديمي</span>
                            <div className="flex gap-4 text-sm font-medium">
                                <button onClick={() => setActivePage('home')} className={activePage === 'home' ? 'active-tab' : ''}>الرئيسية</button>
                                <button onClick={() => setActivePage('library')} className={activePage === 'library' ? 'active-tab' : ''}>المكتبة</button>
                                <button onClick={() => setActivePage('articles')} className={activePage === 'articles' ? 'active-tab' : ''}>المقالات</button>
                            </div>
                        </div>
                    </nav>

                    {/* Content Logic */}
                    <div className="max-w-4xl mx-auto p-4">
                        {activePage === 'home' && (
                            <section className="text-center py-10">
                                <h1 className="text-3xl font-bold mb-4 text-gray-800">مرحباً بك يا خالد</h1>
                                <p className="text-gray-600 mb-8">منصتك الخاصة بالكوتشينج الدراسي وعلم نفس العمل.</p>
                                <div className="bg-indigo-600 p-6 rounded-2xl text-white shadow-lg shadow-indigo-200">
                                    <h2 className="text-xl font-bold mb-2">أحدث كتاب رقمي</h2>
                                    <p className="text-sm opacity-90 mb-4">دليل التفوق في الامتحانات متاح الآن للتحميل.</p>
                                    <button onClick={() => setActivePage('library')} className="bg-white text-indigo-600 px-4 py-2 rounded-lg font-bold">تصفح المكتبة</button>
                                </div>
                            </section>
                        )}

                        {activePage === 'library' && (
                            <section>
                                <h2 className="text-2xl font-bold mb-6">المكتبة الرقمية التفاعلية</h2>
                                <div className="grid gap-4">
                                    <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex items-center gap-4">
                                        <div className="w-16 h-16 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600 font-bold">PDF</div>
                                        <div className="flex-1">
                                            <h4 className="font-bold">سيكولوجية النجاح</h4>
                                            <p className="text-xs text-gray-500">كتاب تفاعلي بخرائط ذهنية</p>
                                        </div>
                                        <button className="text-indigo-600 font-bold">عرض</button>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activePage === 'articles' && (
                            <section>
                                <h2 className="text-2xl font-bold mb-6">مقالات الكوتشينج</h2>
                                <article className="bg-white p-5 rounded-2xl shadow-sm mb-4 border-r-4 border-indigo-600">
                                    <h3 className="font-bold text-lg mb-2">كيف ترفع إنتاجيتك كطالب؟</h3>
                                    <p className="text-gray-600 text-sm leading-relaxed">تحدثنا في هذا المقال عن تقنيات علم نفس العمل وكيفية تطبيقها في المذاكرة...</p>
                                    <button className="text-indigo-600 mt-3 text-sm font-bold italic">اقرأ المزيد ←</button>
                                </article>
                            </section>
                        )}
                    </div>

                    {/* Telegram Style Bottom Menu (Ideal for Mobile) */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-around md:hidden">
                        <button onClick={() => setActivePage('home')} className={`flex flex-col items-center ${activePage === 'home' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <span className="text-xs mt-1">الرئيسية</span>
                        </button>
                        <button onClick={() => setActivePage('library')} className={`flex flex-col items-center ${activePage === 'library' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <span className="text-xs mt-1">المكتبة</span>
                        </button>
                        <button onClick={() => setActivePage('articles')} className={`flex flex-col items-center ${activePage === 'articles' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <span className="text-xs mt-1">المقالات</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
